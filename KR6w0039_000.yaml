  text: 圭峯禪師原人論發微録并序𣈆水沙門淨源述治平改號之明年杭郡崇因大師可中以原人論洎科文為贄請余之或有述焉因念斯論之作也蓋斥二教之淺近會一乘之淵縕故其論旨皆用佛祖之言儒道之語以成文體非夫學深通古洞仲𡰱之𡸁範究伯陽之立言者則罔措其懷矣不爾則何以後孫謀比肩繼踵而傳授道德耶源疇昔嘗讀圎覺疏鈔之廣者而其間窮萬法推一心章精灼實開決疑滯布在鈔文明猶指掌於是不揣檮昧録廣鈔之要辭發斯論之微旨乎吾祖深文奧義未墜于地而請者之心亦無鈇然既録論主鈔辭以發微旨故號之曰發微録焉時聖衆六次甲寅八月十一日於錢唐賢首教院序原人論并序終南山草堂寺圭峯蘭若沙門宗密述𣈆水沙門淨源解原考也窮也謂博考內外推窮萬法原其人道以一心為本焉人字有二釋一多思二多恩𣵀槃經云以多思故蓋能思量善𢙣異餘趣也若言多恩者有慈恩德亦異餘趣故淨名疏云貴於萬物而始終不改謂之人智論云行人法故論者問折徵詮於惠學也故下文以排𫞐淺會偏皈圎皆析微耳并序者以論題兼於自序故云并也薦者舒也舒述三教之淺深四篇之生起也若以并序對原人論兩對在焉序為能序上三字為所序即能序所序對論為能詮原人為所詮即能詮所詮對終南者自帝都南八千里外疊嶂千重危崖萬仞南𡸁遐遠極南海隅故曰終南釋名曰山者産也生産物也草堂始因羅什於大寺中構一堂以草苫詩廉切亦草類蓋之而譯諸經論則草堂之名始𥘿什也圭峯者此峯形勢狀如玉圭因以名焉蘭若此翻無喧諍沙門此云勤息出家者之通稱也次名諱即別稱也且西天以稱名為尊故子名有兼於父母者而後世稱之中夏以避名為尊父母既亡聞名則心瞿音句驚悲也故人與諱之然廟中不諱臨文不諱按法集序裴休述也云圭峰宗密禪師誕形於西充通儒書於遂寧業既就將隨貢詣有司會有大德僧道圎得法於成都荷澤大師嫡孫南即荊南張禪師開法於遂州大雲寺即道圎也禪師遊座下染削為弟子受心法他日隨衆僧齊于州民任家居下位以次受經得圎覺了義未終品感悟流涕皈以所悟告其師師撫之曰汝當大弘圎頓之教此經諸佛授汝耳行矣無自滯於一隅也禪師稽首奉命此去抵襄漢會有自京師負雲華觀大師花嚴疏至者禪師一外座而講聽者數千百人遠近大驚然後至京師詣雲花寺修門人之禪北遊清涼山回住於鄠音戶𮚇草堂寺未幾復入寺南圭山所至道俗皈依者如市得法者數百人著圎覺大小二疏花嚴金剛起信唯識四分法界觀皆有章句先儒注疏皆謂之章句自是圎頓之教大行於世其他原人道之根本會禪宗之異同皆隨叩而應待問而答或徒衆遠地因教誡而成書或門人告終為安心而演偈或凞悟於所證之境告示初心或偃𠈟於所住之山歌詠道趣其文廣著其理彌一其語簡省其義彌圎門弟子集而編之凡若干篇成十卷照照然定惠之明鏡也禪師以法界為堂奧教典為庭宇慈悲為冠蓋衆生為林終日讚述而未嘗以文字為念今所傳者蓋荊山之人以玉抵鵲鹽鐵論云荊山之人以玉抵鵲言其玉多而不寶之也抵擊也而為行人之所寶也行路之人得之乃傳之為寶喻吾師已到寶所凡出言指㕝無非妙門人自寶惜之耳余高枕於吾師戶牖之間久矣吾師之教圎頓明徹入其戶牖即無迷執之憂故言高枕知者不言則後代何以𠈟吾師之道乎於是粗舉其大節以冠集首上皆法集序文後人寡識或安於行願鈔前或冠於斯論之首甚與論題相反彼序法集非序原人今書之於此録中欲明論主之行業耳述者真諦云佛經曰撰菩造論直申佛經曰述亦如仲尼述而不作也萬靈蠢蠢蠢動也靈謂𭇥靈即有情正報也仁王經云衆生蠢蠢都如幻居而已言萬者旦舉大數新記云地空水陸蠢動𭇥靈名數塵沙何啻萬乎皆有其本以蠢動蜎音渕也飛胎濕化皆以真界為本源也萬物藝藝月令曰藝香草也老子經注藝衆多義也各皈其根各皈其所始也有本作紜紜非也且此語出道經彼謂夫物藝藝各歸其根玄宗注云花藝藝者生性皈根今論主欲示依報之物對上正報之身但改夫字為萬字耳未有無根本而有枝末者也皈明依正之枝末以一心為根本焉况三才之中唯人最靈而豈無本源乎况者矧也匹擬也依正之微者尚有根本匹擬况三才唯人最靈而豈無本源乎三才者文心雕龍曰𠈟觀吐耀天才俯察𭇥章地才高定位故曰兩儀儀既兩矣唯人參之性靈所宗是謂三才且知人者智自知者明今我得人身而不自知所從來曷能知他世所趣乎曷能知天下古今之人事乎且語辭知人者智自知者明亦出道經王弼注云知人者自智而已矣未𠰥自知者超智之上也玄宗云智者役用以知物明者融照以智則有所不知明則無所不照受也從來即過去他世即未來曷何也趣向也自不知過去所因何能知未來所向乎天下即現在古今下通三世故數十年中學無常師此句出論語馬融注云無所不從學故無常師尚書又云德無常師主善為師博考內外以原自身原之不已果得其本博廣也考挍也域外治於心謂之內教域中治乎身謂之外教已止也果尅也然今習儒道者秖知近則乃祖乃父傳體相續受得此身習者學也則者𣴎上之辭祖者祭法正義曰祖始也言為道德之始也父者白虎通曰父矩也以法度教子也傳體相續者言父傳祖之遺體相續不絶也蘭盆疏云外教所宗人以形質為本傳體相續遠則混沌一氣即隂陽未分清濁相和故云一也老子云視之不見聽之不聞之不得不可致詰故混而為一手擊也剖為隂陽之二剖分也即一氣始分為隂陽二氣也二生天地人三陽氣輕清為天隂氣重濁為地沖和之氣為人三生萬物三才備方有萬物萬物與人皆氣為本起下文迷執下篇習佛法者但云近則前生造業隨業受報但語辭然業有善𢙣報有苦樂此則善業樂報故云得此人身起下文人天教遠則業又從惑皈推業從貪瞋癡而有也起下文小乘教展轉乃至阿賴耶識為身根本皈推三毒我執從本識法執而生也起下文法相教不序破相者以此教蜜顯真性空寂之理故不序之其顯性教在區別了義中皆謂已窮其理而實未也習儒道以氣為本習佛法以識為本但言已窮此身而實未至本源也然孔老釋迦然者評量之辭孔謂孔丘字仲尼為魯司冠其父先娶施氏生子孟皮早亡後娶顏氏因禱𡰱丘山而生遂以丘為名尼為字言仲者次兄孟皮故也老謂老聃姓李名耳字伯陽諡曰聃為周守藏室之吏其母曾見日精下落如流星入口因而有七十二而生鸖髮龍顏廣顙長耳故立其名釋迦此能仁長阿𭇥云昔有輪王姓甘蔗氏聽次妃之四太子至雪山北自立城居人以德皈仁鬱為強國父王悔憶遣使往召四子辭過不還父王三歎我子釋迦因此命氏皆是至聖凖清淨法行經如來先遣三聖往化支那老子即摩訶迦仲𡰱即淨光童子隨時應物各隨當時以應物機設教殊塗仲𡰱設教則刪詩書定禮樂修春秋贊易道即以六經訓世也伯陽設教唯見素枹朴少思寡欲槌提刑政絶禮樂即以道德二經訓世也能仁設教乃辨性相分化制示行位𫞐實即以十二分教以訓世乃出世也殊途之言出周易彼云天下同歸而殊途途路也內外相資共利群言三聖互相資助同共利樂群衆民也䇿勤萬行䇿謂警䇿明因果始終釋教始修六度為因終證万德為果儒教始覆一簣為因終成九仞為果道教始舉一步為因終行千里為果推窮萬法彰生起本末佛教以一心為本依一心開二門乃至生三細起六為末也儒教以太極為本故易有太極是生兩儀兩儀生四象四象生八卦為末也天地雷風水火山澤是謂八卦道教以一氣為本一生二乃至三生萬物為末也雖皆聖教而有實有𫞐二教唯𫞐二教唯𫞐者儒宗太極道本一氣皆𫞐也佛兼𫞐實佛教惣太極一氣之𫞐而皈一心之實也又𫞐謂第一斥迷執第二斥偏淺實即第三直顯真源也䇿萬行懲𢙣勸善懲誡去𢙣勸勉就善也故周易云小懲而大誡此小人之福也同皈于治則三教皆可遵行尚書云為善不同同皈于治治理也遵依也推萬法窮理盡性至于本源則佛教方為決了窮真如不𫯌之理盡万法隨緣之性易曰窮理盡性以至于命文同義別其在茲乎然當今學士學斆也士事也任事之也各執一宗就師佛者仍迷實義故於天地人物不能原之至源儒生執五常道流執自然皆迷因緣也釋子執緣起而迷性起故次云仍迷實義是也夫實義即性起之本也天地人即緣起之末也故結云不能原之至源矣余今還依內外教理推窮萬法初從淺至深於習𫞐教者斥滯令通而𭫸其本余我也還復也內外教理者教文義理也治於心曰內即吾佛教迹四依章門也治於身曰外即老子道德孔氏五經也於習𫞐教即初二篇皆淺也而極其本即第三篇唯深也滯者疑久也後依了教顯示展轉生起之義會偏令圎而至於末未即天地人物文有四篇名原人也展轉生起者下文以初顯性本唯一心乃至會通儒道二教之末釋序竟斥迷執第一自注云習儒道者斥偏淺第二自注云習佛不了義教者直顯真源第三自注云習了義實教會通本末第四會前所斥同皈一源皆為正義斥迷執第一習儒道者排斥儒道皆迷引滿二業妄執一氣為本也偏淺者此篇始自人天終至破相此四種教皆偏淺不了也直顯真源即一乘顯性方窮了義也會前所斥即前二篇同一真源即第三篇篇者遍也遍述一章之義也儒道二教儒者文選云博通經史謂之儒道者隨書經籍志云蓋萬物之奧聖人之至賾也人畜類等取天地万物也彼二教不餘之三趣餓鬼修羅地獄皆是虗無大道生成育夫道虗也無也非有也非無也莊子云虗無無為万物之本文子曰實出於虗列子云無形而有形生焉故云生成也養樂也育長也謂道法自然老經云人法地地法天天法道道法自然釋曰法者倣效也取則也以大道無所從來名為自然非別有大道而令大道法之也生於元氣彼云道生一一生二二生三三生万物釋曰一是混沌之一氣一氣與道亦非二體但一氣是展轉相生之義道是自然義乎元氣生天地即上一氣生二也天地生萬物即上三生萬物一氣二儀通為三也亦可天地人為三故愚智貴賤貧富苦樂皆於天由於時命計其變通趨時也彼謂存亡者命進退者時隨時進退逐命存亡安天而不憂樂命而不喜故雖天地不得違時耳故死後却皈天地禮記云魂氣皈于天骨肉皈于地復其虗無謂皈其根本也即道經云歸根曰靜靜曰復命然外教宗旨但在乎依身立行依身立行者老子云修之於身其德乃真孝經云修身慎行恐辱先也不在究竟身之元由元由者本因也所萬物不論象外象外者寂知也別行録云象外之理直難證如摩𡰱珠唯圎淨明雖指大道為本而不備明雖者縱奪之辭指大道為本縱也而不備明奪也順逆起染淨因緣故𠰥迷真逐妄從微細順次生起展轉至麁此明染因緣也若悟妄皈真從麁重逆次斷除展轉至細此明淨因緣也出禪詮序習者不知是𫞐前序云二教唯𫞐執之為了謂執一氣於天由時命為了畢也今略舉而詰之所言万物皆從虛無大道而生者舉動也詰問也言舉動前文而誥問也大道即是生死賢愚之本吉凶禍福之基本字基字皆喻道也謂本出生死乃至禍福之末也基本既其常存則禍亂凶愚不可除也福慶賢善不可益也彼以道為常且禍亂凶愚既從道生不可除去則修福積慶尊賢尚善亦不可增益也何用老莊之教耶𠰥禍福賢愚有由老莊即應設教教之令修福夷禍去愚成賢既云皆於道何用教乎即老莊立教是虗也大抄即云是無端也又道道之一字貫通四句育虎狼道既能生万物則虎狼皆是道能養育然虎狼殘害人畜豈非道之不仁歟言虎狼即類取蜂蛇𮬲一切毒𢙣物也虎狼𢙣獸而為師子所敢爾雅云狻猊如彪貓食虎豹狼者徵祥記云狼頭一角黃色馬足胎桀紂夏之桀商之紂皆無道之君胎始也如人胎孕是初育之義是則大道胎育不仁之至塗炭万物也言桀紂即類取庸君暗臣一切𢙣人也諡法曰賊民多殺曰殘義善曰紂上二句明長𢙣下二句明棄善也夭顔回伯牛皆至賢至仁是十哲之首德行之科皆被大道夭屈之令其短命歟禍夷齋伯夷叔齊孤竹君二子皆有志節故夫子云古之賢人也亦被大道禍害之令餓死首陽山下歟何名尊乎老子云道尊德貴今既長𢙣棄善何得為尊貴乎又言萬物皆是自然生化非因緣者則非因緣者皈牒上文言万物無因而自然生無緣而自然化此牒宗也一切無因緣處悉應生化出偏生之過也如穀芽莖無種子是無因處無水土人工是無緣處應生化者即穀芽也悉者一切皆然也謂一切世界無種子水土等處一切有情千品万類以皆無因緣自然生故今現見無本因緣之處皆不生化不生化則自然理破矣謂石應生草草或生人人生畜等意明此法因緣不生彼法以顯各各因緣不雜亂為正因緣也謂畜生所生不取人之因緣人生因緣不𨵿草石等是故石中無草因緣不生於草草中無人因緣不生於人不生於魚等一一例之今現見草不生人等即知互用此彼因緣猶不能生况都無緣而能生耶又應生無前後起無早晚出常生之過也應當也合也謂既無因緣處自然而生且如正月一日便合有穀麥麻豆及一切物一時齊生人畜等亦爾不應穀待三月四月蕎豆待六月七月麥待九月十月等以不假因緣自然能生何待時耶神仙不藉藥就彼宗解行相違以破謂彼教云一切自然而生自然而得不因修習𠰥如此者則自然神仙而求習彼教之徒何必燒煉丸採種靈藥吐納津氣服蔘苓等耶太平不藉賢良謂自然大平何必賢能良善設風政而治之耶仁義不藉教習自然仁義何必詩書禮樂教習之耶老莊周孔何必用立教為軌則乎莊即莊子周即周公莊姓也名周字子休生梁國蒙縣師長桑公子受號南華仙人周公者周即周代姓姬名且文王之子武王之弟成王之叔製禮作樂以輔成主軌車轍也則法則也此亦轍則無用也又言皆從元氣而生成者則歘生之神莊子云人之生氣之聚聚則為生散則為死文子云天氣為魂地氣為魄易曰精氣為物遊魂為𫯌歘者從無忽有不令人覺不知何所來也未曾習慮謂未曾經習愛𢙣喜怒之情慮𠰥言自然無宿生習種者雖逐境隨緣不得而生何者以其未習未慮也豈得嬰孩便能愛𢙣驕恣焉倉頡篇云女曰嬰男曰孩令孩兒幼時逐境隨緣漸漸生愛𢙣等則知先已經習經慮由託生歷世廢忘情習今因再遇境緣愛𢙣漸漸明顯豈但是氣如是乎𠰥言歘有自然便能隨念愛𢙣等者則五德六悉能隨念而解何待因緣學習而成又𠰥生是氣而歘有死是氣散而歘無則𠰥是神知氣歘有自然先無積習驕恣使能隨念愛𢙣者則一切德悉能隨念而解謂逢女色等便愛遇技便為見不平能斷對冤親能解不應對十年五年方有能為之事今既不然則知非歘生便能隨念也既無隨念自成之理而有緣習轉變之道則氣成神神散皈氣不為當矣由是觀之神知之非氣可以明矣五德即五常也要言曰五德之運所謂五行也行者老聃云云行天之氣也木仁德金義德火禮德水信德土智德謂圡既王於四時故四德名為智然則仁者何其於物無不愛之謂也義者何於其所冝行之謂也禮者何先後於物使之無失次之謂也智者何其於㕝無不通之謂也信者何得其冝守而不失之謂也六者一曰禮二曰樂三曰射曰馭五曰書六曰數數者算術也者才能也誰為鬼神乎鬼神之㕝外教及世人皆許是有故約此難之尚書云多才多能㕝鬼神周易云是故知鬼神之情狀且世有鑒逹前生追憶往事則知生前相續非氣而歘有鑑逹前生追憶往㕝者鑑鏡也照也然追前續後略録三人一𣈆太傅羊祜音戶字叔子年五時嘗令乳取先所弄指環乳曰汝先無此物於何取耶祜曰於東垣邊弄之落桑樹中乳曰汝可自覔祜曰此非我先宅兒不知處後因出門遊鄰徑音徑近也東行至李家入門於東垣樹下得小環李驚張曰此亡兒之物也云何持去祜持環走皈乳既祜之一二李驚悲遂欲求祜為兒里中解喻然後乃止二𣈆書鮑靚音淨字太玄東海人生五語父云本是曲陽李家兒年九墮井死其父尋訪果得李氏推問皆符驗焉三釋曇諦俗姓康氏年十餘見閞中僧呼曰童子何得呼宿長名諦曰和尚本是我沙㫆甚諤諦父具諦生時本末乃悟而泣曰即先師弘覺法師也以此驗之則神之相續未嘗絶故得李死為鮑猶記往生覺成曇𮞕論昔事理雖荒昧㕝甚𫞃彰而謂身死神無還皈於氣何罔也又驗鬼神靈知不斷則知死後非氣散而歘無驗證也今録四類以證靈知不斷一蔣濟之子託求官蔣濟字子通楚郡曲阿人魏文帝時為太尉有子亡已七年其妻夜夢見亡兒告之曰我在地下為太山役辛苦頗甚言今領軍府南有𣨒阿者太山府君欲召為省録事願父囑使我得安樂其妻驚覺涕泣告濟濟為人剛強𥘨不信之至明日夜妻復夢見亡兒還如前夢之語而蔣濟遂至領軍府南訪得𣨒阿即以夢中亡兒之言囑阿阿曰𠰥如是當地下為太子方便經二月孫阿病一宿而卒後十日其妻還見亡兒來告之曰我在地下得太山録㕝免伇出別異傳二嬖妾之父為兒結草嬖音閉愛也小史云𣈆大夫魏武子有寵妾武子疾命其子顆告之曰吾死必嫁此妾無我言及疾困復命顆曰必殺妾從我顆思之曰吾從父清釋之言不從昏亂之語後乃嫁之𥘿以杜回為將伐𣈆𣈆命顆為將拒之尅明交戰顆夜夢一人謂顆曰將軍明𫝕早戰我鬼以助必令取勝顆問之曰君是何人而能見助答曰我是將軍亡父嬖妾之父感將軍不殺我女而改嫁之故鬼兵以相助顆喜侵晨動戰以擊𥘿軍杜回為草被圍之進退無路為晉師所敗語云鬼役結草此之謂也三蘇詔卒後來與姪節問晉書曰蘇詔為中牟令卒其姪名節每見詔來與之言語無異於生人前後四十度來節因問曰死何如生曰無異耳節曰要當不如韶笑曰𡖖後自知之節問死者何不皈故尸骸韶曰譬斷𡖖一臂以投於地就剝削之於𡖖有患否尸骸如此也蘇詔言與生不殊者將知死神識不也又如死去尸骸如棄斷臂則人之死也神離人形更受鬼形亦可知矣四孔子語子貢曰死後自知之不晚子貢問孔子曰死人有知乎無知乎子曰吾欲言死之有知將恐孝子順孫妨生以㕝死吾欲言死之無知將恐不孝之子棄其父而不賜姓端木名賜字子貢欲知死者知與無知非今之急後自知之未𣇋也故祭祀求禱典籍有文况死而蘇者塗㕝或死後感動妻子讎報恩今古皆有耶祭享也無巳曰祀巳言止也謂年祭無止所以求索禱福也典藉有文者經典六藉其文備矣亦如禮記有祭法祭統祭義文死而蘇塗事者麟嘉二年癸亥東平王劉約是劉聰之子也死一宿猶暖遂不殮乃蘇蘇息死而更生也言見元海於不周山經五日遂至崑崙山三日後皈於不周山見諸王公𡖖將相死者悉在宮殿甚壯麗號蒙珠離國元海謂約曰東北有遮須夷國無主久待汝父為之二年當來來後國中大亂相殺相害居家死亡略𥁞但可永明輩數十人在耳汝且還後年當來見汝非遲不久約辭而道過一國名𭸟尼渠餘國𭸟音倚引約入宮與皮囊一枚曰為吾遺漢皇帝約辭而皈置皮囊於機上俄而蘇使㔫右機上取囊開之有一方白玉題文曰𭸟尼渠餘國天王敬信遮須夷國天王在攝提當見馳使呈劉聰聰曰若審如此吾不懼死也其後約死屢晝見之聰𢙣之謂太子祭曰吾病惙音輟疲也煩怪異特甚往以約言為妖比纍日見之此兒必來迎也吾何以圖人死定有神靈如是太興元年聰死與此王并葬焉由是言之則死而有知豈虛為哉又有死而蘇者相繼不絶皆是塗官屬受苦之處豈蘇者虛為此見哉死後感動妻子者今依警誡録略引二類一通泉縣令王藻明吏法善刀筆元戎薰璋委任孔目吏鄧可球倚為中要可球有田在通泉謝梁每逋其賦藻追莊戶責令於市可球深銜之乃構藻賦私殺之藻死經五年其妻夢藻曰我負屈數論于天帝今方得理見人與吾同取可球君須與我大備酒食燒化錢紙筆仍飯僧五十人妻覺而悲祝之曰妾今家貧何處得錢副君所要哽泣而寐復夢藻曰舊宅火燒桑樹下有銀五十兩君可取用之明日掘之果得錢乃賽其夢經月可球卒上感動妻下感妻子二豪民鄭昌妻黃氏早亡有二男一女皆幼而昌娶呂氏呂氏性狠而其子凌轢鞭撲普才切打也或湯火潑烙之又加以凍餒昌不能制呂氏後夢一婦人自稱黃氏以棗一枚令吞之覺後得噎疾未愈而復夢黃氏以針簽其兩手心怒云憂抶丑粟切打也我男女覺而生瘡漸透於手而死矣讎報恩者謂讎報恩也報恩如前結草讎者今於顏之推魂志中編録三條一竇嬰漢孝文帝竇皇后從兄弟也封魏其侯為丞相後乃免相因與太僕灌夫交結甚歡恨相知之晚于時孝景帝皇后父同弟田蚡音憤為丞相親幸縱橫使人就嬰求城南田數頃嬰不與曰老漢雖棄丞相雖貴寧可以犱相奪乎灌夫亦助怒之蚡皆恨之乃蚡娶妻皇太后詔列侯宗室往賀蚡灌夫狂醉不肯賀之竇嬰強與俱去因醉酣言辭不遜蚡遂怒謂長史曰有詔宗室而灌夫罵座不敬并奏其在鄉里豪橫夫棄市竇嬰乃上書具陳灌夫醉飽事不足誅帝召見之嬰與蚡互相言長短帝問朝臣兩人誰是朝庭多言嬰是太后聞之怒而不食且曰我在人皆陵藉吾弟我百後魚肉之乎及出蚡復為嬰造作𢙣語以聞句天子亦為蚡不直特為太后故偏將嬰及夫棄市嬰臨死罵曰𠰥為死無知則已耳有知要不獨死後一月餘蚡病一身𥁞痛但號呼叩頭謝曰自幸天子使視者瞻之見竇嬰夫共守笞蚡遂死二何敞音廠為交址刺吏行部到蒼梧郡高要縣暮宿鵲奔亭夜猶未半有一女子從樓下出自言妾姓穌名娥字始𭹀本是廣信𮚇里人早失父母夫亦喪亡有雜繒一百二十匹及婢一人名致富欲往傍縣賣繒就同縣人王伯賃車牛一乘載妾并繒令致富執以前年四月十日到此亭外于時日暮行人既絶復不能前因即留止致富暴得腹痛妾往亭長舍乞漿水取火亭長襲壽操刀持戟操執也釋名戟挌也傍有支格也來至車傍問妾曰夫人從何所來車上何載丈夫安在何故獨行妾應曰何故問之壽因持妾臂曰少愛有色寧可相樂乎妾時怖懼不肯聽從壽即以刀刺𦚰而死又殺致富於樓下埋妾并婢殺牛燒車車釭音工文云車轂中鐵也及牛骨則捨亭東空井中妾死痛無所訴故來皈於明使君敞曰發汝死骸以何為驗女子曰妾上下皆著白衣青糸履猶未杇掘之果然敞乃遣使捕壽下廣信縣驗問與娥語同收壽父母兄弟皆繫獄中敞表殺人𠰥依常律不至族誅但壽為𢙣隱密鬼神自訴千載無一請皆斬之以助隱德上報聽之三梁武帝欲為文帝陵上起寺未有佳材宣意有司使加求訪先有曲阿人姓弘名氏家甚富厚乃共親族多齎戝貨往湘治生遂經數年營得一筏可長千步還至南津被孟少𡖖希朝庭旨乃加繩墨弘氏所賫衣裳繒綵猶有殊餘以涉道刻掠得之并𭃡造作過裂非商估所冝結正處死沒入其筏以充寺用奏遂施行弘氏臨刑之曰其妻子可黃紙百張并具筆墨置棺中也死而有知必當陳訴又書少𡖖姓名數十吞之可經一月少𡖖端坐即見弘來初猶避𢫵音翰禦也後稍服但言乞命歐血而死凡諸獄官預此獄事及署奏者以次殂沒未出一年零落皆𥁞皇寺營構始訖天火燒之略無纖芥所理柱木入地成灰上略敘三條為例其中或有憾積冤深論情訴屈託事求申靈應實多故無虗也豈死者妄為此異哉又有巫上音無下音檄男曰巫女曰即事鬼之徒也見人先祖父母其形狀及平生語言一無參豈巫能作為其哉漢時有王充作無鬼論今取其辭而破之王充曰以田蚡心負慚恨病亂妄見凡人病則畏懼則妄想妄想則虛見破曰𠰥田蚡妄見不當呼諾服罪豈有妄見而想身得病耶𠰥見者天子令視鬼者瞻之竇嬰灌夫兩人共守見苔之豈巫者亦病妄見乎𠰥以巫者亦妄見者不當所見形狀一與病者同也由此而言執虗妄見以為無鬼未見其得矣耶者語絶之辭外難曰𠰥人死為鬼則古來之鬼填塞巷路合有見者如何不爾四句亦王充之問緣論主取意用之不具其文故直言通妨𣗖入科文也難意云若人死為鬼則天地開闢已來道路之上一步一鬼見鬼冝見數百千万滿堂盈庭填塞巷路不冝但見一人兩人鈔意似以一人則田蚡兩人則竇嬰灌夫答曰人死六道不必皆為鬼鬼死復為人等豈古來積鬼當存耶據鈔云夫人死為鬼鬼死為牛牛死為天天死復為人隨業變化不拘一類六道輪回未始有極豈可人獨有死而鬼無死乎𠰥長不死即可如所論也且天地之氣本無知也人無知之氣安得歘起而有知乎夫知即神識也神有賢愚善𢙣千無知之氣豈有此千耶夫識與氣異在氣無知在識有知豈混之於一氣哉故經云四大合散唯心為本在三界中獨來獨去無一隨者據此則知非氣為本𠰥氣而生心心復不合善𢙣等別𠰥善𢙣亦氣則不因習學既不因習學何用孔老設教令改𢙣為善耶草木亦皆氣何不知乎𠰥有知之類即隂陽之氣無知之物則不氣則知與無知各異今既俱隂陽不得為異何故草木無知人畜有知據此則知是神識不關氣也又言貧富貴賤賢愚善𢙣吉凶禍福謂貧乏富足貴尊賤輕賢能愚憃善良𢙣過吉利福祐凶禍二字俱訓害皆由天命者則論語云死生有命富貴在天禮云天命之謂性此言仁義本於性性本於天也天之賦命奚有貧多富少賤多貴少乃至禍多福少破其所計貧富等皆受之於天命也賦者量也奚者何也乃至者具云愚多賢少𢙣多善少多吉少耳苟多少之分在天天何不平乎既富貴多少分數由天興之天何不均平興之而乃不平乎况有無行而貴守行而賤無德而富有德而貧逆吉義凶仁夭暴壽乃至有道者喪無道者興無行而貴者如夏桀殘義殷紂善而為王者是無行而貴也守行而賤者如樊須字子遲素蘊仁行嘗謮學稼執御從遊是守行而賤也無德而富者如齊景公有馬千駟死之日民無得而稱焉亦無德而富也有德而貧者如顏渕一簟食一瓢飲在於陋巷是有德而貧也矧為逆者吉就義者凶仁者夭亡暴者長壽乃至超間之辭有道者喪如仲𡰱孟軻皆有道之聖賢而無其位是亦有道者喪耳無道者興如桓魋毀仲𡰱於宋司馬臧倉謗孟軻於魯平公此亦無道者興焉既皆由天天乃興不道而喪有道此乃顛倒冠履尊卑無序皆天之命也廣鈔云如人以頭載履以足著冠豈非倒耶又令子坐父立君北靣臣南靣豈有序乎今觀天命乃如此也何有福善益謙之賞禍淫害盈之罰焉今相對摘句釋之謂福禍善淫益害謙盈賞罰五對𭃡二對出尚書書云天道福善禍淫謂良善者福之淫𢙣者害之次二對出周易故謙卦云天道虧盈而益謙謙受益也鬼神害盈而福謙人道𢙣盈則害於盈也賞賜也有道者賞之罰罪也無道者罰之何有二字貫於下句又既禍亂反逆皆由天命則聖人設教責人不責天罪物不罪命是不當也據上所則禍亂凶害非天不成反逆不孝非命不就成由天成歸罪於人就由命就責過於物是忿其室而怒於市無以異也夫禍亂自天反逆由命則聖人設教責人不責天罪物不罪命是言之不當者也何則不由於物而反罪於物由天不反罪於天是聖人之教皈於天也皈於天則不法於天矣故云不當耳然則連前起後之辭也詩剌亂政且如平王東遷政令不行賞罰𫞐𫝑皈弱於諸𬾃由是𮮐離之詩作焉孔子刪之乃剌平王亂政之始也書讚王道謂三王開往得天下以至仁罰不仁以大義誅不義出生靈於塗炭躋廉民於富壽所以書讚王道也三王謂夏殷周禮稱安上孝經云安上治民莫善於禮玄宗注云禮所以正君臣父子之別明男女長幼之序故可以安上化下也樂號移風豈是奉上天之意順造化之心乎孝經云移風易俗莫善於樂注云風俗移易先入樂聲變隨人心正由君德正之與變因樂而彰故曰莫善於樂此意謂既一切由天秪合剌天讚天安上移風不關禮樂今乃毛詩剌亂政尚書讚王道乃是反上天之意逆造化之心耳是知專此教者未能原人謂專守老莊周孔之教未能原人之根本也斥偏淺第二習佛不了義教者佛教自淺之深前之四教皆斤偏淺後一顯性方彰圎深耳略有五等不別教一乘故云略也一人天教二小乘教三大乘法相教四大乘破相教自注云上四在此篇中五一乘顯性教自注云在第三篇中小乘教即賢首愚法攝𭃡人天教大乘法相即賢首分教大乘破相即賢首始教一乘顯性即終頓圎同教一乘注有第三篇中即直顯真源習佛了義教也一佛為初心人明人天教此與禪詮序中第一人天因果教大同但彼略此廣耳𠰥依教迹此如普耀經第二七日提謂等五百賈人施佛蜜亦攝人天等經且三世業報圎覺大疏云當知欲因愛有過去身因欲生現在既有此身還生於愛復感未來生死果報是則三世業報皆由於心故遠公報應論云夫事起必由其心報應必由於事是故自報以觀事而事可變舉事以責心而心可反善𢙣因果謂𢙣業為因苦報為果即次文辨三塗也善業為因樂報為果即下文明人天也謂造上品十𢙣死墮地獄一約境於父造殺業為上品二約心則瞋心增勝死墮地獄中品餓鬼一約境於餘人造殺業為中品二約心則慳貪增勝死墮餓鬼下品畜生一約境於蚊蚋等起殺業為下品二約心則愚癡增勝死墮畜生故佛且類世五常之教自注云天竺世教儀式雖殊懲𢙣勸善無別亦不離仁義等五而有德行可修例如此國斂手而舉吐蕃散手而埀皆為禮也天竺者正云印度此月邦世教即五戒也吐蕃外國之名也開皇紀云明宗天成三年九月吐蕃回鶻並來貢令持五戒自注云不殺是仁源云仁有博愛之德下同不盜是義義有合冝之德不邪是禮禮有尊卑敬讓之德不妄語是信信有無虛妄之德不飲噉酒肉神氣清潔益於智也智有照了之德得免三塗生人道中塗道也地獄名火塗道餓鬼名刀塗畜生名血塗道也修上品十善及施戒等即修因也生六欲天即報果也或曰論文何以不中下二品十善耶然修中品十善生人道下品十善生修羅今論主既令持五戒生人道故不言中品也又儒道二教不修羅故不言下品耳修四禪八定生色界無色界天謂修四禪生色界修四空兼前四禪成八定生無色界也自注云題中不標天鬼地獄者界地不同見聞不及風俗尚不知末况𣥜窮本故對俗教且標原人今敘佛經理冝具列界地不同等者謂上界與地下不同是則諸天鬼獄而人同皆見聞不及也尚不知末下尚不知人道見聞之末肯窮天鬼地獄之本乎故名人天教也自注云然業有三種一𢙣業二善業三不動業報有三時謂現報生報後報一𢙣業貪瞋猛盛者即造十𢙣業二善業貪來生富樂之報者造諸善業三不動業厭下苦粗障欣上淨妙離者修四禪八定現報現世作善𢙣即現身受苦樂報生報今生作善𢙣次一生受報後報次二三生乃至未來多生受報名順後報據此教中業為身本今詰之曰既由造業受五道身未審誰人造業誰人受報𠰥此眼耳手足能造業者初死之人眼耳手足𭓩然何不見聞造作受五道身者開出修羅即成六道如助修記若言心作何者是心若言心心有質繫於身內如何速入眼耳辨外是非是非不知因何取捨且心與眼耳手足俱為質閡豈得內外相通運動應接同造業緣心有質者謂團心有形質故按五藏論心脾肝肺腎人之心藏唯一方寸正法念經云如蓮華開合提謂經云心如帝王皆團心也是非不知縱也因何取捨奪也意謂因何取是捨非耶內外相通下心居內眼耳居外內外質礙如何相通耶𠰥言但是喜怒愛𢙣發動身口令造業者喜怒等情乍起乍自無其體將何為主而作業耶喜怒等情者儒以喜怒哀懼愛𢙣欲謂之七情乍暫也起生也設言不應如此別別推尋都是我此身心能造者此身已死誰受苦樂之報喜怒等情為別推窮尋究也𠰥言死後更有身者豈有今日身心造罪修福令他後世身心受苦受樂豈有今日下意謂豈有今世自己身心造罪修福令後世他人受苦受樂言不相應也據此則修福者屈甚謂自己修福善他人受樂報豈非屈耶造罪者幸甚謂自己造罪他人受苦報豈非幸乎幸者小雅云非分遇福也如何神理如此無道理者明也結責神明無道也蘭盆疏云境勝心強徹於神理此推神明有效也故知但習此教者雖信緣縱也不達身本奪也以人天教雖信三世業緣而不知從惑起是不達身本也惑即煩惱障體是第八識二小乘教者形體之色思慮之心從無始來因緣力故念念生相續無窮如水涓涓如燈𦦨𦦨身心假合似一似常二小乘教即同禪詮序中第二斷惑苦教三界不安皆如火宅之苦令斷業惑之集修道證揀邪正辨凡聖分欣厭明因果上皆序文形體之色即四大也思慮之心即四蘊也從無始來因緣力者廣疏云但有諸識從無始來前後生即同此文念念生也又云心心所法因緣力故相續不斷即同此文相續無窮也如水涓涓喻相續無究如燈熖熖喻念念生身心假合即圎覺云四緣假合妄有六根似有緣相假名為心四緣即四大也似一似常者似一非一也似常無常也廣疏云相塵和合似有緣心內外推之何是其體以喻明之似一者如旋火輪有往來故似常者如槖籥風有卷舒故凡愚不覺執之為我我謂主宰如國之主有自在故主有我體俱生宰是我分別寶此我故即起貪自注云貪名利以榮身瞋自注云瞋違情境恐侵害身癡自注云非理計校等三毒三毒擊意發動身口造一切業寶此我者寶積經云於身生寶愛不離於我人禪詮序中作此保字皆愛惜義注非理計校即觸向錯解也三毒者毒以鴆毒為義惱害之甚故謂之毒擊意擊起意識故行願經云無始劫中由貪瞋癡發動身口意作諸𢙣業業成難逃故受五道苦樂等身自注云別業所感三界勝劣等處自注云共業所感於所受身還執為我還起貪等造業受報逃避也如影之隨形如響之應聲形聲喻業因影響喻報果注別業所感者瑜伽論云自身則各隨己業貴賤苦樂不同飛走類別名為別業所感正報注共業所感者論又云此三千世界是衆生共業所感貴賤人畜種種有情同共依之而住名為共業所感依報冝將瑜伽二節之文對此論五道苦樂等身三界勝劣等處皆符合也按唯識論明共別造凡有四句一共中共謂四天皆是有情八識共變二共中不共謂雖是人畜共變受用不同如水魚見舍宅天見琉璃人見清冷鬼見猛火又如由宅各有其主是不共也此二句即共造依報同注文共業所感也三不共中共如男女身根種子各變名不共而受用澀滑無殊即共也四不共中不共如男女五根種所變利鈍明暗一一不同此二句即別造正報同注云別業所感於所受身即前苦樂等身也還執為我即前𭂫愚不覺執之為我也還起貪等即前三毒擊意等文造業即前造一切業受報即前業成難逃等身則生老病死死而復生釋前五道等身界則成住壞空空而復成釋前三界等𣵀槃經以四大山喻生老病死故彼經具云如我昔告波斯匿王此和恱大王有親信人從四方來各作是言大王有四大山從四方來欲害人民王若聞者當設何計王言世尊設有此來無逃避處乃至我四山即是生老病死生老病死常來切人故云死而復生也成住壞空略見注文廣如俱舍自注云從空劫初成世界者頌云空界大風起傍廣數無量厚十六洛叉金剛不能壞此名持界風光音金藏雲布及三千界雨如車軸下風遏不聽流深十一洛叉始作金剛界次第金藏雲注雨滿其內先成梵王界乃至夜摩天風鼓清水成須七金等滓濁為山地四州及𭰖犂鹹海外輪圍方名器界立時經一增減乃至二禪福𥁞下生人間初食地餅林藤後粳米不銷大小便利男女形別分田立主永臣佐等種種別經十九增減兼前二十增減名為成劫議曰空界劫中是道教指之云虗無之道然道體寂照靈通不是虗無老氏或迷之或𫞐務絶人欲故指空界為道空界中大風即彼混沌一氣故彼云道生一也金藏雲者氣形之始即太極也雨下不流隂氣凝也隂陽相合方能生成矣梵王界乃至須者彼之天也滓濁者地也即一生二矣二禪福𥁞下生即人也即二生三三才備矣地餅已下乃至種種即三生萬物此當三皇已前穴居野食未有火化等但以其時無文字記載故後人傳聞不明展轉錯謬諸家著作種種異佛教又緣通明三千世界不局大唐故內外教文不全同也住者住劫亦經二十增減壞者壞劫亦二十增減前十九增減壞有情後一增減壞器界能壞者是火水風等三災空者空劫亦二十增減中空無世界及諸有情也空界大風起者頌又云安立器世間風輪最在下洛叉此云億道場儀頌云十六洛叉廣難窺句此中引頌皆七字也金剛不觸壞者頌云此輪體性殊堅密金剛杵擊亦難摧光音金藏雲至如車軸下頌云大雲澍雨風輪上滴如車軸即成池風遏不𥊸流者論云有情業感由風力持令不流散如輪持穀始作金剛界者又業風起時擊此水上結成金輪先成梵王界即初禪第三天也夜摩此云時分受五欲樂知時分故以夜摩已上諸天皆空居故須此云妙高頌云妙高四寶為山體𨶒浮南面吠琉璃北邊黃金東録體西邊之寶號頗𦙆金山四面七重繞一山一海間相離七金山一雙持二持軸三木四善見五馬耳六象鼻七魚四洲東勝身南贍部西牛貨北俱盧𭰖犂正不可樂其處極苦不可受樂或苦具義地獄謂地下有獄蓋就此方一義也鹹海外輪圍者頌云海外輪山是鐵圍東西南北四洲渚初食地餅下以二禪下生人間初有身光及餐地餅林藤自然粳米後因漸𢙣光及地餅等減即有日月及耕種等然自粳米長半寸不因耕種彼云耕種即此分由也立主者君王也要言曰臣下指君之在己之上至尊之名也求臣佐者禮記曰仕公曰臣臣伏也字象人躬身之狀也道體寂照下謂本覺真心而常知故心要云至道本乎其心心法本乎無住無住心體靈知不昧此乃自心靈明廓徹豈是虗無耶氣形之始下陽氣形兆也易緯云質形已具謂之太極一生二者通指上文一氣生天地之二也三皇伏義神農黃帝居即古人冗處而巢居矣未有火化等此言燧人氏未攻木出火皆野食耳種種異下按天象有其四焉一天之名劉釋名云天坦也謂坦然高而遠也文云天顛也謂在人之顛頂也二天之形顓頊混法曰天形圜也物理論云水之氣升而為天三天之量自天及地計二億一萬六千七百八十一里半四沿古測火黃帝以天象蓋焉蔡邑云天無質狀也據地儀亦有四焉一地之名春秋元命包曰地易也言養万物交易變化也二地之器用白虎通曰地者元氣所生万物之祖也河圖曰天下有九區區別九州也三地之量夏禹所理四海之內地東西二万八千里南北二万六千里四地之形𫝑楊泉云夫土地皆有形名而人莫察焉有龜龍體有麟凰貌然上諸大抵得一理趣則便呼之到極故曰後人傳聞不明展轉錯謬耳大唐即高祖受隨之命封唐國公外帝因號大唐也壞有情者初阿鼻獄等次畜四州六欲皆怖災不造欲界善𢙣等業皆習二禪死即上生更不生鬼獄天人等壞器界者初日光四倍熱次生三日乃至四五後七日並現火洞然起氣衝初禪亦上生去能壞下𣵀槃云𥘨禪內有覺觀外火災壞之二禪內有歡喜外有水災壞之三禪內有喘息外有風災壞之四禪無此過患諸災不及劫劫生生輪迥不絶無終無始如汲井輪自注云道教只知今此世界未成時一度空劫云虗無混沌一氣等名為無始不知空界已前早經千千萬萬遍成住壞空終而復始故知佛教法中小乘淺淺之教已超外典深深之劫劫者謂從劫至劫生死不絶纂要亦云塵沙劫波莫之遏絶下句舉喻可見都由不了此身本不是我不是我者謂此身本因色心和合為相今推尋分析色有地水火風之四心有受自注云能領納好𢙣之事下同想能取像者行能造作者念念遷流識能了別者之四𠰥皆是我即成八我况地大中復有衆多謂三百六十假骨一一各別皮毛筋肝心脾腎各不相是諸心數等亦各不同見不是聞喜不是怒展轉乃至八萬塵勞既有此衆多之物不知定取何者為我𠰥皆是我我即百千一身之中多主紛亂離此之外復無別法覆推我皆不可得各不相是皮不是毛等八万塵勞者圎覺疏云遍觀八万塵勞之衆八万舉其大數諸經塵勞門有八万四千故淨名經云八万塵勞皆為侍者謂貪瞋癡等分一中即有二万一千四合有八万四千耳便悟此身但是衆緣即四大五蘊也假和合相元無我人永嘉云四大五隂一一非我和合亦無為誰貪瞋為誰殺盜施戒自注云知苦諦也遂不滯心於三界有漏善𢙣自注云斷集諦也但修無我觀智自注云道諦以斷貪等止息諸業證得我空真如自注云諦乃至得阿羅漢果灰身智方斷諸苦乃至者謂不前之三果以三果皆是有餘下句辨無餘灰身即指四大之形知即絶四蘊之心方斷諸苦結歸無餘據此宗中以色心二法及貪瞋癡為根身器界之本也過去未來更無別法為本今詰之曰夫經生纍世為身本者自體須無間斷圎覺鈔云經生越世永不斷絶即同此文須無間斷耳今五識闕緣不起自注云根境等為緣意識有時不行自注云悶絶睡眠𥁞定無想定無想天意識不行注文有五一悶絶二睡眠三𥁞定即二乘無漏定四無想定即外道有漏定五無想天即色界中一天無色界天無此四大如何持得此身世世不絶是知專此教者亦未原身亦未原身者此教詮法唯辨六識未賴耶為身本也三大乘法相教者一切有情無始已來法爾有八種識大乘法相教即同禪詮序中第三將識破境教彼序云生等法不關真如但各是衆生無始已來云云彼云衆生即此文一切有情而言法爾者無始常然名為法爾然此一教即深密等經唯識諸論其間廣明八識二無我能變之識所緣之境具如慈恩法師章門今但引圎覺疏鈔略辨原人本耳於中第八阿賴耶識是其根本頓變根身器界種子阿賴耶此藏識是一切衆生𢝰報體能𭇥諸法種子故以為名是則賴耶為能變能緣三境為所變所緣根身則眼等五色根及根依處種子即善𢙣無記等三性種子器界即山河大地等斯皆第八相分然此相分皆為第八執受執謂攝義持義受謂領以為境領生覺受於中種子具三義一攝為自體二持令不散三領以為境根身具二闕攝為自體故器界唯一但領以為境故故唯識云不可知犱受處亦可種子根身緣而執受器世間量但緣而非執受故轉生七識皆能變現自分所緣都無實法如何變耶自分所緣者謂眼緣色耳緣鼻緣香舌緣味身緣觸意緣法七緣見八緣根種器界也謂我法分別熏習力故諸識生時變似我法我法分別者𠰥依起信前四中第二相續相即法執分別第四計名字相即我執分別其第一智相即法執俱生第三執取相即我執俱生今但取二執分別妄心熏習之內耳變似我法者謂我法二執本無無而似有故唯識論云依此二分設我法相見二分彼二離此無所依故彼二我法離此二分無所依故第六七識無明覆故緣此執為實我實法第六七識無明覆等謂執我法者是六七心所當起信中二執分別無明所覆矣緣此執為實我實法者二十唯識偈云唯識無境界以無塵妄見如人目有翳見毛月等事有本云執為實有即實有我法也如患自注云重病心惛見異色人物也夢自注云夢想所見可知者患夢力故心似種種外境相現夢時執為實有外物窹來方知唯夢所變𠰥凖唯識論即使幻化字文云如幻夢者幻夢力故心似種種外境相現緣此執為實有外境彼意釋云幻夢所見之物雖無其夢幻則不是無是故有力變起妄境𠰥約病患之喻者如人淨眼被風熱等翳即見空華種種相貌成唯識論釋意云空華雖無其見華之翳眼非無是則二喻雖異約法皆同耳我身亦爾唯識所變迷故執有我及諸境由此起惑造業生死無窮自注云廣如前悟解此理方知我身唯識所變識為身本自注云不了之義如後所破我身亦爾者按禪詮序云我此身相及外世界亦復如是彼序將識破境教故雙明依正此論原其身本唯顯正報故云我身亦爾諸境即我所注廣如前者前文云寶此我故乃至三毒擊意動身口造一切業業成難逃故受苦樂等身劫生生輪不絶也四大乘破相教者即同禪詮序中密意破相顯性教𠰥例彼三種佛教證三宗禪心前大乘法相教證息妄修心宗此大乘破相教證泯絶無寄宗後一乘顯性教證真顯心性宗破前大小乘法相之教小乘法相即色心三毒為身相器界之本大乘法相即唯識頓變三境以賴耶為本密顯後真性空寂之理禪詮注云意在顯性語乃破相意不形於言中故云密也真性空𡧤之理約萹即直顯真源約教即一乘顯性自注云破相之談不唯諸部般𠰥遍在大乘經前之三教依次先後此教隨執即破無定時節故樹立二種般𠰥一共二不共共者二乘同聞信解破二乘法執故不共者唯菩解密現佛性故故天竺戒賢智光二論師各立三時教措此空教或云在唯識法相之前或云在後今意取後各立三時下謂戒賢論師遠承勒無著近踵護法難陀立三種教初有教即阿𭇥等經次空教即諸部般𠰥後中道教即深密等經前二非了義後一方為了義智光論師遠承文殊龍樹近清目清辨亦立三時教初鹿𫟍小乘心境俱有次法相大乘境空心有後無相大乘心境俱空亦前二非了義後一為了義在唯識法相前即戒賢論師或云在後即智光論師將欲破之先詰之曰所變之境既妄即圎覺鈔喻云胡蝶之相即全空無也能變之識豈真則胡蝶之想豈獨是有乎夢想與所見物應異者如莊周睡時夢見身為胡蝶在華中𠰥言一有一無者自注云此下却將彼喻破之則夢想與所見物應異異則夢不是物物不是夢寤來夢其物應在夢不是物物不是夢者如夢𠰥非蝶蝶亦非夢也窹來夢其物應在應云窹來夢胡蝶應在以二物真妄別故又物𠰥非夢應是真物夢𠰥非物以何為相四句但以物字為蝶字讀之即帖喻明矣故知夢時則夢想夢物似能見所見之殊據理則同一虗妄都無所有諸識亦爾以皆假託衆緣無自性故應云夢想與胡蝶雖似能見所見之殊其實一體也故中觀論云未曾有一法不從因緣生是故一切法無不是空者又云因緣所生法我即是空起信論云一切諸法唯依妄念而有別𠰥離心念即無一切境界之相經云凡所有相皆是虛妄離一切相即名諸佛自注云如此等文遍大乘藏是知心境皆空方是大乘實理方是大乘實理者先縱之乃是但空之實理也不了之義後文奪破𠰥約此原身身元是空空即是本今復詰此教曰𠰥心境皆無知無者誰知無者誰此一句出𥘿王答書彼云諸家通第一義諦皆云廓然空寂無有聖人𠰥無聖人無知者誰今論主借其語𫝑破心境俱無矣又𠰥都無實法依何現諸虛妄且現見世間虛妄物未有不依實法而能起者如無濕性不變之水何有虛妄假相之波𠰥無淨明不變之鏡何有種種虛假之影濕性之水淨明之鏡皆喻本有性淨真心又前夢想夢境同虛妄者誠如所言然此虛妄之夢必因睡眠之人今既心境皆空未審依何妄現必因睡眠之人即性淨真心亦合前莊周睡時本心耳故知此教但破執情亦未明顯真靈之性故法鼓經云一切空經是有餘自注云有餘者餘義未了也大品經云空是大乘之𭃡門上之四教展轉相望前淺後深𠰥且習之自知未了名之為淺𠰥執為了即名為偏故就習人云偏淺也前淺後深者以人天教唯齊業報小乘教齊後四麁法相教極於三細破相教密顯真性是則人天唯淺破相唯深中間二教互論淺深謂望前則深望後則淺也直顯真源第三佛了義實教源之一字喻一切衆生本覺真性也在萬法為依正之源在衆生為迷悟之源在菩為万行之源在諸佛為万德之源五一乘顯性教者即同禪詮序中顯示真心即性教彼對禪宗直顯心性宗故云即性此超第三法相第四破相故云顯性又異大乘偏淺故標一乘大乘法相在生門極於三細大乘破相在真如門密顯空義皆偏淺耳一切有情皆有本覺真心無始已來常住清淨此就真如性遍一切衆生皆有本覺真心也大經云法性遍在一切處一切衆生及國土智論云白石有銀性黃石有金性一切衆生有𣵀槃性斯皆良證也無始已來常住清淨者起信云一切衆生本來常住又云不失不壞常住一心從本已來一切染法不相應故故云清淨然清淨有其二義無上依經云一者自性清淨是且通相二者離垢清淨是其別相寶性論中亦有二義一自性清淨謂性淨解脫二離垢清淨謂離障解脫今云常住清淨即通相性淨解脫也昭昭不昧了了常知亦名佛性亦名如來藏華嚴回向品云真如照明為性故云不昧此言知者不是證知意既真性不同虛空木石故云知也非如緣境分別之識非如照體了逹之智直是真如之性自然常知故馬鳴菩云真如者自體真實識知義故亦名佛性下是諸佛万德之源故名佛性是衆生迷悟之源故名如來藏釋上文義多依禪詮兼取賢首教義章從無始際妄想翳之際時也翳障也妄想即無明起信云從無始時來皆因無明所熏習故又染心義名煩惱礙能障真如根本智故不自覺知十地論云真樂本有失而不知妄苦本空得而不覺但認凡質故耽著結業受生死苦大覺愍之一切皆空向明妄想即法執所知障也但認凡質即我執煩惱障質身也耽著結業即業障受生死苦即報障大覺即世尊故詮序云感而即通名大覺尊愍悲也一切皆空者以世問生死出世𣵀槃一切皆空此敘前破相也又開示靈覺真心清淨全同諸佛正述顯性問明品云其性本清淨開示諸衆生全同諸佛者清涼疏云凡厥生靈皆𭇥佛智圎滿普法無不備矣故華嚴經云佛子無一衆生而不具有如來智惠但以妄想執著而不證得𠰥離妄想一切智自然智無礙智即得現前此皆出現品開物因性經文但以等者具云但以妄想顛倒執著釋曰凡夫妄想𫞐小執著顛倒通二便舉一塵𭇥大千經卷之喻塵况衆生經况佛智大經云譬如有大經卷喻佛智慧量等三千大千世界智體無邊廓周法界書寫三千大千世界事一切皆𥁞喻體上本有恆沙功德恆沙妙用也此大經卷雖復量等大千世界而全住在一微塵中喻佛智全在衆生身中圎滿具足也如是一塵舉一衆生為例一切微塵皆亦如是故云塵况衆生也次後又云爾時如來普觀法界一切衆生而作是言竒哉竒哉此諸衆生云何具有如來智惠迷惑不見我當教以聖道令其永離妄想自於身中得見如來廣大智惠與佛無異教以聖道者即教彼衆生修習聖道道因也謂六波羅密三十七道品也評曰我等多劫未遇真宗不解反自原身但執虛妄之相甘認凡下或畜或人評量也真宗即佛教但執下圎覺云妄認四大為自身相六塵緣影為自心相故結云甘認凡夫下類矣今約至教原之方覺本來是佛至教者佛教至極之談即指華嚴也本來是佛者圎覺疏云心本是佛由念起以漂沈出現品云始知衆生本來成佛故須行依佛行心契佛心清涼心要云𠰥任運以寂知則衆行受起即行依佛行也𠰥無心而妄照則万纍都即心契佛心也還本還源斷除凡習之又以至無為自然應用恆沙名之曰佛還本還源者大疏云今諸衆生還本還源窮未來際無有休息凡習即凡夫習氣之下以為道日惑也為學日益智也之又之則寂照現前自然應接恆沙之機非佛而何當知迷悟同一真心大哉妙門原人至此迷即衆生悟即諸佛大經云心佛及衆生是三無別故云同一也大哉即𠈟歎之辭妙門即絶思之自注云然佛前五教或漸或頓𠰥有中下之機則從淺至深漸漸誘接先𭃡教令離𢙣住善次二三令離染住淨後談四五破相現性會𫞐皈實依實教修乃至成佛𠰥上上根智則從本至末謂𭃡便依第五頓指一真心體心體既現自覺一切皆是虛妄本來空寂但以迷故託真而起須以悟真之智斷𢙣修善息妄皈真妄𥁞真圎是名法身佛或漸或頓者詮序云轉凡成聖即漸從迷而悟即頓中下之機通取漸修漸悟以明中下離𢙣住善即人天教離十𢙣修十善也離染住淨者小乘即離煩惱染住我空之淨法相即離所知之染住法空之淨會𫞐皈實即會破相之𫞐皈顯性之實也若上上根智至本來空寂即頓悟也從但以迷故已下之文即漸修也由迷無明為妄惑悟妄惑真智悟真之智為能斷妄惑之𢙣為所斷餘如文會通本末第四自注云會前所斥同皈一源皆為正義未即第一斥迷執第二斥偏淺本即第三直顯真源故云會前所斥同皈一源真性雖為身本即躡前顯性教云一切有情皆有本覺真心也生起蓋有因由言迷真生妄心有所因故起信云不如實知真如法一不覺心起此則起妄之由也不可無端忽成身相推其身本即現相中根身是忽成身相也但緣前宗未了所以節節斥之今將本末會通乃至儒道亦是始自迷執宗終至破相宗有五節矣自注云初唯第五性教所從後假已去節級方同諸教各如注記謂初唯一真靈性起信云所言法者謂衆生心衆謂四聖生謂六凡詮序云凡夫聖賢根本悉是靈明清淨一法界心即同此文一真靈性不生不不增不減不變不易起信云所謂心性不生不無有變異乃至離念境界唯證相應上但攝引論文或引禪詮序為證衆生無始迷睡不自覺之由隱覆故名如來藏依如來藏故有生心相起信云心生者依如來藏故有生心無始迷睡即法喻雙標論云猶如迷人依方故迷迷喻無明方喻覺性𠰥凖前文云然此虛妄之夢必因睡眠之人則睡喻覺性夢喻妄識皆生門耳自注云自此方是第四教亦同破此已生諸相亦同下應云亦同破此已有生諸相諸相即垢淨增減故心經云是諸法空相不生不不垢不淨不增不減正同此也所謂不生不真心與生妄想和合非一非異名為阿賴耶識起信云所謂不生不與生和合今云真心即不生如來藏妄想生心相故十地論云唯真不生單妄不成真妄和合方有所為此識有覺不覺二義起信論云此識有二種義一者覺義謂心體離念二者不覺義謂不如實知詮序云覺是三乘賢聖之本不覺是六道凡夫之本自注云此下方是法相教中亦同所依不覺故最初動念名為業相起信云一者無明業相以依不覺故心動名為業即此云最初動念也二者能見相以依動故能見即此云轉成能見之識也三者境界相以依能見故境界妄現即此云境界相現也又不覺此念本無故轉成能見之識及所見境界相現又不覺此境從自心妄現執為定有名為法執起信云智相依於境界心起分別即此云從自心妄現也又云相續相依於智故生於苦樂即此云執為定有也自注云此下方是第二小乘教中亦同所執此等故遂見自他之殊起信云執取相依於相續緣念境界即此云遂見自他之殊也便成我執執我相故貪愛順情諸境欲以潤我瞋嫌違情諸境恐相惱愚癡之情展轉增長執我下起信云計名字相依於妄執分別即此云貪愛瞋嫌愚癡之情也自注云此下方是第一人天教中亦同所故殺盜等心神乘此之𢙣業生地獄鬼畜等中起信云起業相依於名字尋名取著造種種業善𢙣二業其善業在次文又云業繫苦相以依業受報不自在故苦樂二報樂報亦在次文釋云𢙣業即此殺盜等等者以十𢙣中但言殺盜之二等取餘八也心神即妄心神識也苦報即此云地獄鬼畜也復有怖此苦者或性善者行施戒等心神乘此善業運於中隂入胎中謂有怖三塗之苦者行戒等言等者等取餘善也乘者乘因感果也中隂者謂此隂既彼隂未生故云於中隂入胎中即人趣樂報也自注云此下方是儒道二教亦同所氣受質自注云會彼所以氣為本氣則頓具四大漸成諸根心則頓具四蘊漸成諸識十月滿足生來名人即我等今者身心是也故知身心各有其本質身也以氣為本者前文云万物與人皆氣為本漸成諸根者如佛為難陀廣記胎相在胎中三十五箇七日人相具足即漸成也諸根即五根諸識即五識十月滿足者或云計日即唯九月如托華鈔辨之二類和合方成一人身即四大心即四蘊此二和合方成人耳天修羅等大同於此人道既以身心和合餘之五趣亦皆大同又𠰥鬼趣色蘊人見不及非非天唯有細色是亦小異然雖因引業受得此身復由滿業故貴賤貧富壽夭病健盛𮕱苦樂俱舍云引業引一生多業能圎滿猶如繢像先圖形狀後填衆彩受得此身即先圖形狀也貴賤貧富即後填衆彩也然其引業能造之思要是第六意識所起𠰥其滿業能造之思從五識起又此引滿二業亦名總別二報𢝰別交絡有其四句一揔報善別報不善謂人受貧窮疾病等二揔報不善別報善謂畜生有肥好等三揔別俱善謂人受富貴等四俱不善謂畜生有盲跛者今此既原人身唯取第一句人受貧窮疾病即同此文貧賤病苦也第三句人受富貴等即同此文富貴盛樂也其第二第四兩句既是畜生揔別二報故不引配耳謂前生敬慢為因今感貴賤之果乃至仁壽殺夭富慳貧種種別報不可具述前生敬人為因今感尊貴為果前生慢人為因今感卑賤為果乃至前生行仁為因今感長壽為果餘皆例之是以此身或有無𢙣自禍無善自福不仁而壽不殺而夭等者皆是前生滿業已定故今世不同所作自然如然外學者不知前世但據目覩唯執自然自然如然者言非使之然也自注云會彼所自然為本自然為本者前文云万物皆是自然生化復有前生少者修善老而造𢙣或少𢙣老善故今世少小富貴而樂老大貧賤而苦或少貧苦老富貴等文有四句皆隔句以示因果前生下初句為因故今下第三句為果第二句或前生少𢙣老善為因第四句或今世少貧苦老富貴為果故外學者唯執否泰由於時運否泰者周易二卦之名也否者天地不交而万物不通也二氣不接万物塞矣泰者天地交而万物通也二氣交感万物乃通故雜卦云否泰反其類也由於時運者時塞即止否也時行即通泰也自注云會彼所皆由天命皆由天命者前文云貴賤苦樂皆於天由於時命耳然所之氣展轉推本即混一之元氣也所起之心展轉窮源即真一之靈心也所之氣即二氣受身也展轉推本者推於萬物本乎天地推於天地本乎元氣也所起之心即六識心也展轉窮源者窮前六識本乎末那窮第七末那本乎賴耶窮第八賴耶本乎一心源也究實言之心外的無別法元氣亦從心之所變屬前轉識所見之境是阿賴耶相分所攝即真心外的無別法以該萬有即是一心矣從心下即真心隨緣也相分所攝謂元氣屬相分攝耳從初一念業相分為心境之二初一念即三細中第一業相心即第二轉相境即第三現相心既從細至展轉妄計乃至造業謂轉相從業相起也以業相是細中之細轉相是細中之耳展轉妄計即六中智相相續執取計名四云云也乃至造業即第五起業相也其第六業計苦相即下文業成即身成也自注云如前敘列如前敘列者即前文始自顯一心乃至第五人天齊業報是也境亦從微至著展轉變起乃至天地謂現相亦從轉相起也微著即細變其文耳展轉變起即根身種子乃至天地即器世間自注云即彼始自大易五重運轉乃至太極太極生兩儀彼自然大道如此真性其實俱是一念能變見分彼云元氣如此一念初動其實但是境界之相即彼者指儒教也易緯曰氣象未分謂之太易元氣始萠謂之太初氣形之端謂之太始形變有質謂之太素形質已具謂之太極彼五重運轉例此從微至著也彼下指道教也能變見分即第二轉相元氣儒道二教皆宗之一念初動即第一業相境界之相即第三現相業既成熟即從父母受二氣與業識和合成就人身謂過去已熟之業為因此世父赤白二氣為緣與初念業識和合漸成人耳據此則心識所變之境乃成二分一分即與心識和合成人一分不與心合即是天地山河國邑三才中唯人靈者由與心神合也心識即業識也與識和合即心有知覺不與心合即想枯澄凝故楞嚴云想澄成國土即此文云天地國邑知覺乃衆生即此文云和合成人𠰥對三境和合成人即根身種子天地國邑即器世間裴相序亦云內為筋骸所捁外為山河所昡可以例釋佛內四大與外四大不同正是此也內外四大者內謂自他身內所有堅者即毛髮等外謂自他身外所有堅者即土石等地大既爾餘之三大亦然不同者和合與不和合也哀哉寡學異執紛紛哀哉悲歎之辭寡者許慎曰少也學者楊雄曰覺也紛然亂通而言之少學之人異端妄執紛然而亂故肇公云異端之論紛然久矣或謂通惠云臣實慙寡學空老年齡此乃臣下對天子之謙辭耳寄語道流欲成佛者必須洞明粗細本末方能棄末皈本變照心源寄語道流即學道之流無外亦云寄言後哲冝乎介懷細約惑次文辨之本末約教謂棄前二篇之末皈直顯真源之本故云變照心也粗𥁞細除靈性顯現無法不達名法報身自然應現無窮名化身佛𥁞細除即起信隨分究竟二覺論云念無住相以離分別念相故名隨分覺又云覺心初起心無初相以遠微細念故名究竟覺靈性即法身故論云法身顯現自然而有不思議業種種之用故云無法不達也法身是理報身是智理智合如珠與光即發化用故曰應現無窮矣佛祖統紀云法師淨源晉江楊氏受華嚴於五臺承遷遷師注金師子章學合論於橫海明𫟛還南聽長水楞嚴圎覺起信時四方宿學推為義龍因省親于泉請主清涼復遊吳住報恩觀音杭守沈文通置賢首院於祥符以延之復主青鎮密印寶閣華亭普照善住高麗僧統義天杭海問道申弟子禮初華嚴一宗疏鈔久矣散墜因義天持至咨決逸而復得左丞蒲宗孟撫杭愍其苦志奏以慧因易禪為教義天還國以金書華嚴三譯本一百八十卷晉嚴觀一法師同譯六十卷唐實叉難𨹔譯八十卷又唐烏茶進本澄觀法師譯四十卷以遺師為王上祝壽師乃建大閣以奉安之時稱師為中興教主以此寺奉金書經故俗稱高麗寺元祐三年十一月示寂舍利于寺西北萬治二年己亥七月吉辰高橋清兵衛板行
